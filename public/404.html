<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>Redirect | ACSIC Knowledge Hub</title>
    <script>
      const base = '/acsic-knowledge-hub/';
      const path = location.pathname.startsWith(base) ? location.pathname.slice(base.length) : '';
      location.replace(base + '#/' + path + location.search);
    </script>
  </head>
  <body>
    <p>Returning to ACSIC Knowledge Hub. 正在返回 ACSIC Knowledge Hub。</p>
  </body>
</html>
